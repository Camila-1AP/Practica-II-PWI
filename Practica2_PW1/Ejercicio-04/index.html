<!--
Crea una página HTML con un formulario que contenga campos de texto y un botón de envío. Usa CSS para estilizar los campos con bordes redondeados, un fondo gris claro y que el botón cambie de color al pasar el mouse.

-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 04</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="#" method="post">
        <h1>Formulario de Contacto</h1>
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <br>
        <button type="submit">Enviar</button>

    </form>
    
</body>
</html>
