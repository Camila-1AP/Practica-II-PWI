<!--
Crea una página HTML con un encabezado y un párrafo. Usa CSS en el mismo archivo utilizando una etiqueta <style> para cambiar el color del encabezado a azul y el tamaño del texto del párrafo a 18px.
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 01</title>

    <style>
        h1 {
            color: blue;
        }

        p {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Este es un encabezado azul</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aperiam nam, et sed eveniet labore, quam molestiae libero provident maiores, quae omnis tempore quo consequuntur culpa saepe voluptatibus explicabo perspiciatis consequatur.</p>
    
</body>
</html>
